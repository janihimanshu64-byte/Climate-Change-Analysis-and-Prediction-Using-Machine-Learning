{% extends "base.html" %}
{% block title %}Upload Dataset - Weather Forecast{% endblock %}
{% block content %}
<h1 style="color: #38bdf8;">Upload Weather Dataset</h1>


<div class="card">
    <form method="post" action="{{ url_for('upload') }}" enctype="multipart/form-data" id="upload-form">
        <input type="hidden" name="use_sample_10" id="use_sample_10" value="no">
        <div class="form-group">
            <label for="dataset">CSV Dataset</label>
            <input type="file" id="dataset" name="dataset" accept=".csv" style="width: 100%; padding: 0.75rem;">
        </div>
        <div class="form-actions">
            
            <button type="submit" class="btn btn-primary" id="btn-upload">Upload Dataset & Run</button>
            
        </div>
    </form>
</div>
<script>
function useSample10() {
    document.getElementById('use_sample_10').value = 'yes';
    document.getElementById('dataset').removeAttribute('required');
    document.getElementById('upload-form').submit();
}
document.getElementById('upload-form').addEventListener('submit', function(e) {
    if (document.getElementById('use_sample_10').value !== 'yes' && !document.getElementById('dataset').value) {
        e.preventDefault();
        alert('Please choose a CSV file or click "Use sample 10-year dataset".');
    }
});
</script>
{% endblock %}
